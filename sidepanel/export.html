<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NaviMind chat</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        max-width: 720px; margin: 32px auto; padding: 0 24px;
        color: #16232c; line-height: 1.5;
      }
      .toolbar {
        display: flex; align-items: center; justify-content: flex-end;
        gap: 10px; margin-bottom: 20px;
      }
      .toolbar button {
        border: none; border-radius: 8px; background: #0b6e6e; color: #fff;
        padding: 9px 16px; font: inherit; font-weight: 600; font-size: 13.5px; cursor: pointer;
      }
      .toolbar button:hover { background: #0a5a5a; }
      h1 { font-size: 19px; margin: 0 0 4px; }
      .meta { color: #5b6b76; font-size: 13px; margin-bottom: 24px; }
      .msg { margin-bottom: 16px; }
      .role {
        font-weight: 700; font-size: 11px; text-transform: uppercase;
        letter-spacing: 0.04em; color: #5b6b76; margin-bottom: 4px;
      }
      .msg.user .role { color: #0b6e6e; }
      .bubble {
        border: 1px solid #e2e8ec; border-radius: 10px; padding: 10px 13px;
        white-space: pre-wrap; word-wrap: break-word;
      }
      .msg.user .bubble { background: #f2fbfb; }
      .bubble p { margin: 0 0 8px; }
      .bubble p:last-child { margin-bottom: 0; }
      .bubble code { background: #eef2f4; padding: 1px 5px; border-radius: 4px; font-size: 0.9em; }
      @media print {
        .toolbar { display: none; }
        body { margin: 0; max-width: none; }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="btn-print" type="button">Save as PDF / Print</button>
    </div>
    <h1 id="doc-title">NaviMind conversation</h1>
    <div class="meta" id="doc-meta"></div>
    <div id="export-thread"></div>
    <script src="export.js"></script>
  </body>
</html>
